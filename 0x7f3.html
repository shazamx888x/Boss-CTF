    <script>
        (function(){
            function getKeyFromDOM(){
                const links = document.querySelectorAll('.nav-bar a[data-cipher]');
                for(let link of links){
                    const cipher = link.getAttribute('data-cipher');
                    if(cipher){
                        try{
                            let decoded = atob(cipher);
                            let result = '';
                            for(let i = 0; i < decoded.length; i++){
                                let charCode = decoded.charCodeAt(i);
                                if(charCode >= 33 && charCode <= 126){
                                    charCode = 33 + ((charCode - 33 + 47) % 94);
                                }
                                result += String.fromCharCode(charCode);
                            }
                            return result;
                        } catch(e){
                            continue;
                        }
                    }
                }
                return null;
            }
            
            window.authenticate = function(){
                const input = document.getElementById('auth-input').value.trim();
                const msg = document.getElementById('auth-msg');
                const realKey = getKeyFromDOM();
                
                if(!realKey){
                    msg.innerHTML = '✗ SYSTEM ERROR';
                    msg.style.color = '#ff00ff';
                    return;
                }
                
                if(input === realKey){
                    msg.innerHTML = '✓ ACCESS GRANTED';
                    msg.style.color = '#00ff88';
                    document.getElementById('download-section').style.display = 'block';
                    localStorage.setItem('ctf_level1', 'true');
                }else{
                    msg.innerHTML = '✗ ACCESS DENIED';
                    msg.style.color = '#ff00ff';
                }
            };
