<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cipher Intercept</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 
            ═══════════════════════════════════════
            HASH: $2a$12$NfavfpnQI4hIGqN.wrSKOe9P7PObqzlvg3f8UQ0vMwF/hH3ctC/4C
            ═══════════════════════════════════════
            This is the session token hash
            Decrypt it to proceed
        */
        .hash-container { display: none; }
        
        /* n3xus.html - final destination */
        
        .cipher-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .cipher-box {
            background: #000;
            border: 1px solid #0f0;
            padding: 15px;
            opacity: 0.4;
            font-size: 11px;
            word-break: break-all;
        }
        .cipher-box:hover { opacity: 0.8; }
        .cipher-box.fake { border-color: #333; }
        .cipher-box.real { border-color: #0f0; opacity: 0.8; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    
    <div class="content">
        <div class="panel" style="max-width:800px;">
            <div style="font-size:12px;opacity:0.3;">CLASSIFIED TRANSMISSION</div>
            <h1 style="font-size:20px;">CIPHER INTERCEPT</h1>
            
            <div style="margin:20px 0;padding:15px;background:#000;border:1px solid #0f0;opacity:0.3;">
                <span style="font-size:11px;">SECTOR 7G // ENCRYPTED CHANNEL</span>
            </div>
            
            <!-- Hash hidden in plain sight -->
            <div class="hash-container" data-hash="$2a$12$NfavfpnQI4hIGqN.wrSKOe9P7PObqzlvg3f8UQ0vMwF/hH3ctC/4C"></div>
            
            <!-- Cipher grid - all decoys -->
            <div class="cipher-grid">
                <div class="cipher-box fake">U2FsdGVkX1/...</div>
                <div class="cipher-box fake">AES: 9f8d7e6c...</div>
                <div class="cipher-box fake">RSA: 2048-bit...</div>
                <div class="cipher-box fake">SHA256: 7d8f3...</div>
                <div class="cipher-box fake">MD5: e10adc...</div>
                <div class="cipher-box fake">Base64: SGVsbG8=</div>
                <div class="cipher-box fake">Hex: 48656c6c6f</div>
                <div class="cipher-box fake">ROT13: Uryyb</div>
                <div class="cipher-box fake">Caesar: Khoor</div>
                <div class="cipher-box fake">Vigenere: 8f3...</div>
            </div>
            
            <hr class="divider">
            
            <label style="font-size:12px;opacity:0.5;">SESSION TOKEN</label>
            <input type="password" id="token-input" style="width:100%;background:#000;border:1px solid #0f0;color:#0f0;padding:10px;font-family:monospace;margin:10px 0;" placeholder="enter token..." autocomplete="off">
            <div id="token-msg" style="font-size:12px;min-height:20px;"></div>
            <button onclick="verifyToken()" style="background:transparent;border:1px solid #0f0;color:#0f0;padding:10px 30px;font-family:monospace;cursor:pointer;">SUBMIT</button>
        </div>
    </div>
    
    <script src="js/rain.js"></script>
    <script>
        // The real token is: BaSe_HeX098765432_1@
        // But it's hidden behind bcrypt hash and base64 encoding
        
        function verifyToken() {
            const input = document.getElementById('token-input').value.trim();
            const msg = document.getElementById('token-msg');
            
            // This is the real token after all decryption
            const realToken = 'BaSe_HeX098765432_1@';
            
            // Check if input matches the real token
            if (input === realToken) {
                msg.innerHTML = '✓ ACCESS GRANTED';
                msg.style.color = '#0f0';
                localStorage.setItem('ctf_level2', 'true');
                setTimeout(() => {
                    window.location.href = 'n3xus.html';
                }, 1500);
            } else {
                msg.innerHTML = '✗ INVALID TOKEN';
                msg.style.color = '#f00';
            }
        }
        
        document.getElementById('token-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') verifyToken();
        });
        
        // Hidden console message for advanced users
        console.log('%c🔑 Hash found in source. Crack it to find the token.', 'color: #0f0; font-size: 14px;');
        console.log('%c💡 The hash is bcrypt - use appropriate tools.', 'color: #0f0; font-size: 14px;');
        console.log('%c⚠️ After cracking, decode from Base64 to get the session token.', 'color: #0f0; font-size: 14px;');
    </script>
</body>
</html>
