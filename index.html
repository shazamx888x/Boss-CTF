<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER ARENA - Level 1</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body{background:#0a0a0a;overflow:hidden;user-select:none;font-family:'Press Start 2P',monospace;margin:0;padding:0}
        .hidden{display:none}
        #game-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:radial-gradient(circle at 20% 50%,#1a0033,#0a0a0a);opacity:0.8}
        .particle{position:absolute;width:4px;height:4px;background:#00ff88;border-radius:50%;box-shadow:0 0 10px #00ff88;animation:float linear infinite}
        @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}
        .glow-text{text-shadow:0 0 20px #00ff88,0 0 40px #00ff88,0 0 60px #00ff8833}
        .pixel-border{border:3px solid #00ff88;box-shadow:0 0 30px #00ff8833,inset 0 0 30px #00ff8811}
        .status-indicator{display:flex;gap:10px;justify-content:center;margin:15px 0}
        .status-dot{width:10px;height:10px;border-radius:50%;background:#00ff8833;border:1px solid #00ff8833;transition:all 0.5s ease}
        .status-dot.active{background:#00ff88;border-color:#00ff88;box-shadow:0 0 20px #00ff88}
        .status-dot.waiting{background:#ff00ff33;border-color:#ff00ff33}
        .status-dot.complete{background:#ff00ff;border-color:#ff00ff;box-shadow:0 0 20px #ff00ff}
        .status-dot.reset{background:#ff0000;border-color:#ff0000;box-shadow:0 0 20px #ff0000}
        .timer-hidden{display:none}
        .scan-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#00ff88,transparent);opacity:0.1;animation:scan 8s linear infinite}
        @keyframes scan{0%{top:0}100%{top:100%}}
        .anti-inspect{position:fixed;top:0;left:0;width:100%;height:100%;z-index:99999;pointer-events:none}
        .loading-text{color:#00ff8822;font-size:6px;margin-top:5px;letter-spacing:3px}
        .status-message{color:#00ff8844;font-size:8px;margin-top:10px;min-height:20px;text-align:center}
        .status-message.error{color:#ff0000}
        .status-message.success{color:#00ff88}
        .status-message.waiting{color:#ff00ff44}
        .key-press-warning{color:#ff000044;font-size:7px;text-align:center;margin-top:10px;display:none}
        .key-press-warning.show{display:block}
    </style>
</head>
<body>
    <div id="game-bg"></div>
    <div id="particles"></div>
    
    <div style="position:relative;z-index:10;display:flex;align-items:center;justify-content:center;height:100vh;padding:20px">
        <div style="background:rgba(10,10,20,0.95);border:3px solid #00ff88;padding:40px;max-width:700px;width:100%;box-shadow:0 0 60px #00ff8822;position:relative;overflow:hidden">
            <div class="scan-line"></div>
            
            <div style="position:absolute;top:-12px;left:20px;background:#0a0a20;padding:0 15px;color:#00ff88;font-size:12px;letter-spacing:3px">LEVEL 01</div>
            
            <div style="text-align:center;margin-bottom:30px">
                <div style="font-size:48px;color:#ff00ff;text-shadow:0 0 30px #ff00ff,0 0 60px #ff00ff44">◆</div>
                <h1 style="color:#00ff88;font-size:20px;text-shadow:0 0 30px #00ff88;margin-top:10px">SYSTEM ACCESS</h1>
                <div style="width:60px;height:2px;background:#00ff88;margin:15px auto;box-shadow:0 0 20px #00ff88"></div>
            </div>
            
            <div style="color:#00ff8866;font-size:11px;text-align:center;margin-bottom:30px;line-height:1.8">
                <span style="color:#ff00ff88">[</span> CONNECTION ESTABLISHED <span style="color:#ff00ff88">]</span><br>
                <span style="color:#888">◆</span> INITIALIZING SECURE CHANNEL <span style="color:#888">◆</span>
            </div>
            
            <div class="status-indicator">
                <div class="status-dot active" id="dot1"></div>
                <div class="status-dot waiting" id="dot2"></div>
                <div class="status-dot waiting" id="dot3"></div>
                <div class="status-dot waiting" id="dot4"></div>
                <div class="status-dot waiting" id="dot5"></div>
            </div>
            
            <div style="background:#000;border:1px solid #00ff8833;padding:20px;margin-bottom:20px;text-align:center;position:relative">
                <div style="color:#00ff8844;font-size:10px;letter-spacing:2px">ENCRYPTED NODE DIRECTORY</div>
                <div style="color:#00ff8822;font-size:8px;margin-top:5px">ANALYST ACCESS ONLY</div>
                <div style="color:#00ff8822;font-size:7px;margin-top:10px">◆ CONNECTION PENDING ◆</div>
                <div class="status-message" id="statusMsg">AWAITING AUTHORIZATION...</div>
                <div class="key-press-warning" id="keyWarning">⚠ KEY PRESS DETECTED - ACCESS DENIED ⚠</div>
            </div>
            
            <div style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin-top:20px">
                <div style="width:60px;height:60px;border:2px solid #00ff8833;background:#000;display:flex;align-items:center;justify-content:center;color:#00ff8844;font-size:20px">⏣</div>
                <div style="width:60px;height:60px;border:2px solid #00ff8833;background:#000;display:flex;align-items:center;justify-content:center;color:#00ff8844;font-size:20px">⏣</div>
                <div style="width:60px;height:60px;border:2px solid #00ff8833;background:#000;display:flex;align-items:center;justify-content:center;color:#00ff8844;font-size:20px">⏣</div>
                <div style="width:60px;height:60px;border:2px solid #ff00ff33;background:#000;display:flex;align-items:center;justify-content:center;color:#ff00ff44;font-size:20px">⏣</div>
            </div>
            
            <div style="color:#00ff8822;font-size:6px;text-align:center;margin-top:20px;letter-spacing:1px">
                ◆ SYSTEM STANDBY ◆
            </div>
        </div>
    </div>

    <script>
        (function(){
            const container=document.getElementById('particles');
            for(let i=0;i<50;i++){
                const p=document.createElement('div');
                p.className='particle';
                p.style.left=Math.random()*100+'%';
                p.style.animationDuration=(10+Math.random()*20)+'s';
                p.style.animationDelay=(Math.random()*10)+'s';
                p.style.width=(2+Math.random()*4)+'px';
                p.style.height=p.style.width;
                p.style.background=Math.random()>0.5?'#00ff88':'#ff00ff';
                p.style.boxShadow=`0 0 ${10+Math.random()*20}px ${p.style.background}`;
                container.appendChild(p);
            }
        })();
        
        (function(){
            // Disable right-click
            document.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                return false;
            });
            
            // Disable keyboard shortcuts for DevTools
            document.addEventListener('keydown', function(e) {
                // F12
                if(e.key === 'F12') {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
                if(e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+U (View Source)
                if(e.ctrlKey && e.key === 'u') {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+C (Inspect Element)
                if(e.ctrlKey && e.shiftKey && e.key === 'C') {
                    e.preventDefault();
                    return false;
                }
                // Ctrl+Shift+E (DevTools)
                if(e.ctrlKey && e.shiftKey && e.key === 'E') {
                    e.preventDefault();
                    return false;
                }
                return true;
            });
            
            // Disable text selection
            document.addEventListener('selectstart', function(e) {
                e.preventDefault();
                return false;
            });
            
            // Disable drag
            document.addEventListener('dragstart', function(e) {
                e.preventDefault();
                return false;
            });
            
            // Disable copy
            document.addEventListener('copy', function(e) {
                e.preventDefault();
                return false;
            });
            
            // Override console methods to prevent DevTools detection bypass
            const originalConsole = window.console;
            window.console = {
                log: function(){},
                warn: function(){},
                error: function(){},
                info: function(){},
                debug: function(){}
            };
            
            // Re-enable console after 15 seconds (for legitimate use)
            setTimeout(function() {
                window.console = originalConsole;
            }, 15000);
            
            // Anti-Debugging - detect DevTools
            function detectDevTools() {
                const start = performance.now();
                debugger;
                const end = performance.now();
                if(end - start > 100) {
                    // DevTools is open
                    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a;color:#ff00ff;font-family:\'Press Start 2P\',monospace;text-align:center;padding:20px"><div><h1 style="color:#ff00ff;font-size:24px;margin-bottom:20px">⚠ ACCESS DENIED</h1><p style="color:#00ff8844;font-size:12px">Security breach detected.<br>Terminal locked.</p></div></div>';
                    document.body.style.overflow = 'hidden';
                }
            }
            
            // Run anti-debugging check periodically
            setInterval(detectDevTools, 1000);
            
            // Block DevTools opening via keyboard shortcuts (redundant but extra layer)
            const blockDevTools = function() {
                if(window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
                    // DevTools might be open in separate window
                    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a;color:#ff00ff;font-family:\'Press Start 2P\',monospace;text-align:center;padding:20px"><div><h1 style="color:#ff00ff;font-size:24px;margin-bottom:20px">⚠ ACCESS DENIED</h1><p style="color:#00ff8844;font-size:12px">Security breach detected.<br>Terminal locked.</p></div></div>';
                    document.body.style.overflow = 'hidden';
                }
            };
            
            // Check for DevTools every 5 seconds
            setInterval(blockDevTools, 5000);
        })();
        
        (function(){
            let t=120, e=!1, n=document.querySelectorAll('.status-dot'), o=0;
            let keyPressed=false;
            let timerRunning=true;
            const statusMsg=document.getElementById('statusMsg');
            const keyWarning=document.getElementById('keyWarning');
            
            // Monitor keyboard activity
            document.addEventListener('keydown', function() {
                if(timerRunning && !e) {
                    keyPressed = true;
                    keyWarning.classList.add('show');
                    statusMsg.textContent = '⚠ ACCESS DENIED - KEY PRESS DETECTED';
                    statusMsg.className = 'status-message error';
                    
                    // Reset dots
                    n.forEach((l,s)=>{
                        if(s===0) l.className='status-dot active';
                        else l.className='status-dot reset';
                    });
                    
                    // Reset timer
                    t = 120;
                    o = 0;
                    
                    // Reset progress after 2 seconds
                    setTimeout(function() {
                        keyWarning.classList.remove('show');
                        statusMsg.textContent = 'AWAITING AUTHORIZATION...';
                        statusMsg.className = 'status-message waiting';
                        n.forEach((l,s)=>{
                            if(s===0) l.className='status-dot active';
                            else l.className='status-dot waiting';
                        });
                    }, 2000);
                }
            });
            
            function r(){
                if(timerRunning && !e){
                    t--, o++;
                    let a=Math.min(Math.floor((o/120)*5),4);
                    n.forEach((l,s)=>{
                        if(s<=a && s>0) l.className='status-dot active';
                        else if(s===0) l.className='status-dot active';
                        else l.className='status-dot waiting';
                    });
                    
                    // Update status message
                    if(t>0 && t<=30) {
                        statusMsg.textContent = `◆ CONNECTING... ${t}s remaining ◆`;
                        statusMsg.className = 'status-message waiting';
                    } else if(t>0) {
                        statusMsg.textContent = '◆ AWAITING AUTHORIZATION ◆';
                        statusMsg.className = 'status-message waiting';
                    }
                    
                    if(t<=0 && !e){
                        e=!0;
                        timerRunning=false;
                        n.forEach(l=>l.className='status-dot complete');
                        statusMsg.textContent = '✓ CONNECTION ESTABLISHED';
                        statusMsg.className = 'status-message success';
                        
                        let p=document.createElement('div');
                        p.className='popup-win';
                        p.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#0a0a20,#1a0033);color:#00ff88;padding:35px;border:3px solid #ff00ff;font-family:"Press Start 2P",monospace;z-index:999999;text-align:center;box-shadow:0 0 80px #ff00ff33,inset 0 0 80px #00ff8811;min-width:320px;animation:fadeIn 0.5s ease-out';
                        p.innerHTML='<div style="font-size:40px;color:#ff00ff;text-shadow:0 0 30px #ff00ff;margin-bottom:15px">◆</div><h2 style="font-size:16px;margin-bottom:15px;color:#00ff88">NODE DISCOVERED</h2><div style="background:#000;padding:12px;margin:15px 0;border:2px solid #00ff88;font-size:11px;word-break:break-all;color:#ff00ff">0x7f3.html</div><button onclick="window.location.href=\'0x7f3.html\';this.parentElement.remove()" style="background:#00ff88;color:#000;border:none;padding:12px 35px;font-family:\'Press Start 2P\',monospace;cursor:pointer;font-size:10px;margin-top:15px">ACCESS NODE</button>';
                        document.body.appendChild(p);
                        let d=document.createElement('style');
                        d.textContent='@keyframes fadeIn{0%{opacity:0;transform:translate(-50%,-50%) scale(0.8)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}';
                        document.head.appendChild(d);
                        return
                    }
                    setTimeout(r,1e3)
                }
            }
            setTimeout(r,1e3)
        })();
    </script>
</body>
</html>
