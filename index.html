<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER ARENA - Level 1</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body{background:#0a0a0a;overflow:hidden;user-select:none;font-family:'Press Start 2P',monospace}
        .hidden{display:none}
        #game-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;background:radial-gradient(circle at 20% 50%,#1a0033,#0a0a0a);opacity:0.8}
        .particle{position:absolute;width:4px;height:4px;background:#00ff88;border-radius:50%;box-shadow:0 0 10px #00ff88;animation:float linear infinite}
        @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) scale(1);opacity:0}}
        .glow-text{text-shadow:0 0 20px #00ff88,0 0 40px #00ff88,0 0 60px #00ff8833}
        .pixel-border{border:3px solid #00ff88;box-shadow:0 0 30px #00ff8833,inset 0 0 30px #00ff8811}
    </style>
</head>
<body>
    <div id="game-bg"></div>
    <div id="particles"></div>
    
    <div style="position:relative;z-index:10;display:flex;align-items:center;justify-content:center;height:100vh;padding:20px">
        <div style="background:rgba(10,10,20,0.95);border:3px solid #00ff88;padding:40px;max-width:700px;width:100%;box-shadow:0 0 60px #00ff8822;position:relative">
            <div style="position:absolute;top:-12px;left:20px;background:#0a0a20;padding:0 15px;color:#00ff88;font-size:12px;letter-spacing:3px">LEVEL 01</div>
            
            <div style="text-align:center;margin-bottom:30px">
                <div style="font-size:48px;color:#ff00ff;text-shadow:0 0 30px #ff00ff,0 0 60px #ff00ff44">◆</div>
                <h1 style="color:#00ff88;font-size:20px;text-shadow:0 0 30px #00ff88;margin-top:10px">SYSTEM ACCESS</h1>
                <div style="width:60px;height:2px;background:#00ff88;margin:15px auto;box-shadow:0 0 20px #00ff88"></div>
            </div>
            
            <div style="color:#00ff8866;font-size:11px;text-align:center;margin-bottom:30px;line-height:1.8">
                <span style="color:#ff00ff88">[</span> CONNECTION ESTABLISHED <span style="color:#ff00ff88">]</span><br>
                <span style="color:#888">◆</span> INITIALIZING SECURE CHANNEL <span style="color:#888">◆</span>
            </div>
            
            <div style="background:#000;border:1px solid #00ff8833;padding:20px;margin-bottom:20px;text-align:center">
                <div style="color:#00ff8844;font-size:10px;letter-spacing:2px">ENCRYPTED NODE DIRECTORY</div>
                <div style="color:#00ff8822;font-size:8px;margin-top:5px">ANALYST ACCESS ONLY</div>
            </div>
            
            <div style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin-top:20px">
                <div style="width:60px;height:60px;border:2px solid #00ff8833;background:#000;display:flex;align-items:center;justify-content:center;color:#00ff8844;font-size:20px">⏣</div>
                <div style="width:60px;height:60px;border:2px solid #00ff8833;background:#000;display:flex;align-items:center;justify-content:center;color:#00ff8844;font-size:20px">⏣</div>
                <div style="width:60px;height:60px;border:2px solid #00ff8833;background:#000;display:flex;align-items:center;justify-content:center;color:#00ff8844;font-size:20px">⏣</div>
                <div style="width:60px;height:60px;border:2px solid #ff00ff33;background:#000;display:flex;align-items:center;justify-content:center;color:#ff00ff44;font-size:20px">⏣</div>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const container=document.getElementById('particles');
            for(let i=0;i<50;i++){
                const p=document.createElement('div');
                p.className='particle';
                p.style.left=Math.random()*100+'%';
                p.style.animationDuration=(10+Math.random()*20)+'s';
                p.style.animationDelay=(Math.random()*10)+'s';
                p.style.width=(2+Math.random()*4)+'px';
                p.style.height=p.style.width;
                p.style.background=Math.random()>0.5?'#00ff88':'#ff00ff';
                p.style.boxShadow=`0 0 ${10+Math.random()*20}px ${p.style.background}`;
                container.appendChild(p);
            }
        })();
        
        (function(){
            let t=false;
            setTimeout(function(){
                if(!t&&!document.querySelector('.popup-win')){
                    const p=document.createElement('div');
                    p.className='popup-win';
                    p.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:linear-gradient(135deg,#0a0a20,#1a0033);color:#00ff88;padding:35px;border:3px solid #ff00ff;font-family:"Press Start 2P",monospace;z-index:999999;text-align:center;box-shadow:0 0 80px #ff00ff33,inset 0 0 80px #00ff8811;min-width:320px';
                    p.innerHTML='<div style="font-size:40px;color:#ff00ff;text-shadow:0 0 30px #ff00ff;margin-bottom:15px">◆</div><h2 style="font-size:16px;margin-bottom:15px;color:#00ff88">NODE DISCOVERED</h2><div style="background:#000;padding:12px;margin:15px 0;border:2px solid #00ff88;font-size:11px;word-break:break-all;color:#ff00ff">0x7f3.html</div><button onclick="window.location.href=\'0x7f3.html\';this.parentElement.remove()" style="background:#00ff88;color:#000;border:none;padding:12px 35px;font-family:\'Press Start 2P\',monospace;cursor:pointer;font-size:10px;margin-top:15px">ACCESS NODE</button>';
                    document.body.appendChild(p);
                    t=true;
                }
            },5000);
        })();
    </script>
</body>
</html>
